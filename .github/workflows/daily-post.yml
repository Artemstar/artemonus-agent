name: artemonus.eth Agent — Daily Post

on:
  schedule:
    # Каждый день в 09:00 UTC (12:00 Prague time)
    - cron: "0 9 * * *"
  workflow_dispatch:
    # Запустить вручную через GitHub UI (для теста)

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run agent
        env:
          # Добавь эти secrets в: Settings → Secrets and variables → Actions
          TWITTER_API_KEY:        ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET:     ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN:   ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET:  ${{ secrets.TWITTER_ACCESS_SECRET }}
          NEYNAR_API_KEY:         ${{ secrets.NEYNAR_API_KEY }}
          NEYNAR_SIGNER_UUID:     ${{ secrets.NEYNAR_SIGNER_UUID }}
        run: python agent.py
